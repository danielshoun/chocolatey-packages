name: Update alire

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-alire
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run updater
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\alire\update.ps1

      - name: Read package version
        id: package-version
        shell: pwsh
        run: |
          $content = Get-Content -Path .\alire\alire.nuspec -Raw
          $match = [regex]::Match($content, '<version>([^<]+)</version>')
          if (-not $match.Success) {
            throw 'Could not read package version from alire/alire.nuspec.'
          }

          "value=$($match.Groups[1].Value)" >> $env:GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: Update alire package to v${{ steps.package-version.outputs.value }}
          title: Update alire package to ${{ steps.package-version.outputs.value }}
          body: |
            This PR updates the Chocolatey package to version `${{ steps.package-version.outputs.value }}`.

            Automated update generated by `.github/workflows/update-alire.yml`.
          branch: automation/update-alire
          delete-branch: true
          add-paths: |
            alire/**
